<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="InfinityPaste">
  <title>InfinityPaste</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .tab-content{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;flex-direction:column;}
    .tab-content.active{display:flex;}
    .panel-toolbar{padding:.75rem 1rem .5rem;display:flex;flex-direction:column;gap:.5rem;border-bottom:1px solid var(--border);flex-shrink:0;}
    .text-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;color:var(--text);font-size:.95rem;line-height:1.6;resize:none;outline:none;font-family:inherit;}
    .text-input:focus{border-color:var(--accent);}
    .toolbar-actions{display:flex;gap:.5rem;flex-wrap:wrap;}
    .card-list{padding:.5rem .5rem 1rem;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem;margin-bottom:.5rem;}
    .card-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.3rem;}
    .card-label{font-size:.72rem;font-weight:600;color:var(--accent);background:rgba(59,130,246,.12);border-radius:4px;padding:1px 6px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .card-source,.card-count,.card-time{font-size:.68rem;color:var(--text-faint);}
    .card-preview{white-space:pre-wrap;word-break:break-word;font-size:.85rem;line-height:1.5;padding:.3rem 0;color:var(--text-muted);}
    .card-actions{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.5rem;}
    .record-controls{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 1.5rem;gap:1rem;flex-shrink:0;}
    .record-buttons{display:flex;gap:.75rem;}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;color:var(--text-faint);text-align:center;gap:.4rem;}
    .empty-state-icon{font-size:2.5rem;margin-bottom:.4rem;}
    .file-upload-label{cursor:pointer;}
    .file-viewer{display:flex;flex-direction:column;flex:1;overflow:hidden;}
    .file-viewer-header{display:flex;align-items:center;gap:.6rem;padding:.65rem .75rem;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
    .file-viewer-title{flex:1;font-size:.82rem;font-weight:500;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .file-viewer-content{flex:1;overflow-y:auto;padding:1rem;font-size:.88rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;color:var(--text);-webkit-user-select:text;user-select:text;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:flex-end;justify-content:center;}
    .modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:90dvh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem;border-bottom:1px solid var(--border);}
    .modal-title{font-size:1rem;font-weight:700;}
    .modal-body{padding:.5rem 0;}
    .modal-footer{padding:1rem;border-top:1px solid var(--border);}
    .setting-row{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.9rem;gap:.75rem;}
    .setting-label{font-weight:500;color:var(--text-muted);}
    .setting-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.4rem .65rem;color:var(--text);font-size:.85rem;outline:none;-webkit-appearance:none;max-width:200px;}
    .settings-value{font-size:.82rem;color:var(--text-muted);}
    .toast-container{position:fixed;bottom:calc(env(safe-area-inset-bottom)+1rem);left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:.5rem;align-items:center;pointer-events:none;}
    .toast{background:#1f2937;color:#f9fafb;padding:.65rem 1.1rem;border-radius:999px;font-size:.85rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transform:translateY(20px);transition:opacity .25s,transform .25s;}
    .toast--visible{opacity:1;transform:translateY(0);}
    .toast--error{background:#7f1d1d;color:#fca5a5;}
    .stitch-area{padding:12px 16px;background:var(--surface);border-radius:8px;margin:0 16px 12px;display:none;}
    .stitch-title{font-weight:600;margin-bottom:8px;}
    .stitch-queue{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;font-size:.8rem;}
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-title">
        <span class="header-logo">∞</span>
        InfinityPaste
      </div>
      <div style="display:flex;gap:.4rem;">
        <button class="header-badge" onclick="pasteFromClipboard()" title="Paste from clipboard">📋</button>
        <button class="header-badge" onclick="openSettings()" title="Settings">⚙️</button>
      </div>
    </header>

    <nav class="tab-bar">
      <button class="tab active" data-tab="queue" onclick="switchTab('queue')">📋 Queue</button>
      <button class="tab" data-tab="record" onclick="switchTab('record')">🎙 Record</button>
      <button class="tab" data-tab="files" onclick="switchTab('files')">📁 Files</button>
    </nav>

    <div id="tab-queue" class="tab-content active">
      <div class="panel-toolbar">
        <textarea id="text-input" class="text-input" rows="3" placeholder="Type or paste text here…"></textarea>
        <div class="toolbar-actions">
          <button class="btn btn-primary btn-sm" onclick="submitText()">Add</button>
          <button class="btn btn-danger btn-sm" onclick="clearQueue()">🗑 Clear</button>
          <button class="btn btn-secondary btn-sm" onclick="detectAllLanguages()">🌐 Languages</button>
        </div>
      </div>
      <div id="queue-list" class="card-list"></div>
    </div>

    <div id="tab-record" class="tab-content">
      <div class="record-controls">
        <div class="record-timer" id="rec-timer">00:00</div>
        <div class="record-buttons">
          <button id="rec-btn-start" class="btn btn-primary" onclick="startRecording()">⏺ Record</button>
          <button id="rec-btn-stop" class="btn btn-danger" onclick="stopRecording()" disabled>⏹ Stop</button>
        </div>
      </div>
      <div id="recordings-list" class="card-list"></div>
    </div>

    <div id="tab-files" class="tab-content">
      <div class="panel-toolbar">
        <label class="btn btn-primary btn-sm file-upload-label">
          📎 Upload
          <input type="file" multiple accept="image/*,.pdf,.txt,.md,.csv,.json" onchange="handleFileUpload(this)" style="display:none">
        </label>
      </div>
      <div id="stitch-area" class="stitch-area">
        <div class="stitch-title">🧵 Table Stitch Queue</div>
        <div id="stitch-queue-list" class="stitch-queue"></div>
        <button class="btn btn-primary btn-sm" onclick="stitchTables()">🧵 Stitch Tables</button>
      </div>
      <div id="files-list" class="card-list"></div>
      <div id="file-viewer" style="display:none" class="file-viewer">
        <div class="file-viewer-header">
          <span id="file-viewer-title" class="file-viewer-title"></span>
          <button class="card-btn" onclick="closeViewer()">✕</button>
        </div>
        <div id="file-viewer-content" class="file-viewer-content"></div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div id="settings-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeSettings()">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Settings</h2>
        <button class="card-btn" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal-body">
        <div class="setting-row">
          <label class="setting-label">OpenAI API Key</label>
          <input id="setting-key" type="password" class="setting-input" placeholder="sk-…">
        </div>
        <div class="setting-row">
          <label class="setting-label">Model</label>
          <input id="setting-model" type="text" class="setting-input" value="gpt-4o">
        </div>
        <div class="setting-row">
          <label class="setting-label">Theme</label>
          <select id="setting-theme" class="setting-input">
            <option value="auto">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div class="setting-row">
          <label class="setting-label">Show timestamps</label>
          <input id="setting-timestamps" type="checkbox" checked>
        </div>
        <div class="setting-row">
          <label class="setting-label">Version</label>
          <span class="settings-value">2.0.0</span>
        </div>
        <div class="setting-row" style="gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="exportData()">⬆️ Export</button>
          <label class="btn btn-secondary btn-sm">⬇️ Import<input type="file" accept=".json" onchange="importData(this)" style="display:none"></label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" style="width:100%" onclick="saveSettingsFromForm()">Save</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
